name: Build iHPro Activator

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            python-version: '3.10'
            executable: iHPro_Activator.exe
            platform: windows
          - os: macos-latest
            python-version: '3.10'
            executable: iHPro_Activator
            platform: macos
          - os: ubuntu-latest
            python-version: '3.10'
            executable: iHPro_Activator
            platform: linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libssl-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install pymobiledevice3
          pip install PyQt5
          pip install certifi
          pip install urllib3

      - name: Prepare build resources
        run: |
          # Créer un dossier pour les ressources si nécessaire
          mkdir -p build_resources

      - name: Build with PyInstaller (Windows)
        if: matrix.platform == 'windows'
        run: |
          pyinstaller --onefile --windowed --name iHPro_Activator `
            --add-data "payload.sql;." `
            --add-data "logo.png;." `
            --add-data "fond.png;." `
            --icon logo.ico `
            --hidden-import pymobiledevice3 `
            --hidden-import pymobiledevice3.services.afc `
            --hidden-import pymobiledevice3.services.diagnostics `
            main.py

      - name: Build with PyInstaller (macOS)
        if: matrix.platform == 'macos'
        run: |
          pyinstaller --onefile --windowed --name iHPro_Activator `
            --add-data "payload.sql:." `
            --add-data "logo.png:." `
            --add-data "fond.png:." `
            --icon logo.icns `
            --hidden-import pymobiledevice3 `
            --hidden-import pymobiledevice3.services.afc `
            --hidden-import pymobiledevice3.services.diagnostics `
            main.py

      - name: Build with PyInstaller (Linux)
        if: matrix.platform == 'linux'
        run: |
          pyinstaller --onefile --windowed --name iHPro_Activator `
            --add-data "payload.sql:." `
            --add-data "logo.png:." `
            --add-data "fond.png:." `
            --hidden-import pymobiledevice3 `
            --hidden-import pymobiledevice3.services.afc `
            --hidden-import pymobiledevice3.services.diagnostics `
            main.py

      - name: List build output
        run: |
          ls -la dist/
          ls -la build/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iHPro_Activator_${{ matrix.platform }}
          path: |
            dist/${{ matrix.executable }}
            dist/iHPro_Activator  # pour macOS sans extension
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          ls -la artifacts/
          find artifacts/ -type f -exec ls -la {} \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/iHPro_Activator
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}