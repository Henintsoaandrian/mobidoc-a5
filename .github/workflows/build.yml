name: iHPro Activator A5-A6 Bypass V1.0

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.file_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            file_name: "iHPro_Activator_Windows"
            sep: ';'
          - os: ubuntu-latest
            file_name: "iHPro_Activator_Linux"
            sep: ':'
          - os: macos-latest
            file_name: "iHPro_Activator_macOS_ARM"
            sep: ':'
          - os: macos-13
            file_name: "iHPro_Activator_macOS_Intel"
            sep: ':'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install PyQt5 pymobiledevice3 pyinstaller requests certifi pyusb

    - name: Install DMG Creator (macOS)
      if: runner.os == 'macOS'
      run: brew install create-dmg

    - name: Build macOS App (for DMG)
      if: runner.os == 'macOS'
      env:
        MACOSX_DEPLOYMENT_TARGET: "10.13"
      run: |
        # On ne met pas --onefile pour avoir un dossier .app
        pyinstaller --noconfirm --windowed \
          --name "${{ matrix.file_name }}" \
          --icon "logo.icns" \
          --add-data "payload.sql${{ matrix.sep }}." \
          --add-data "logo.png${{ matrix.sep }}." \
          --add-data "fond.png${{ matrix.sep }}." \
          --collect-all pymobiledevice3 \
          --hidden-import pymobiledevice3.services.afc \
          --hidden-import pymobiledevice3.services.diagnostics \
          --hidden-import pymobiledevice3.lockdown \
          main.py

    - name: Build Windows Executable
      if: runner.os == 'Windows'
      run: |
        pyinstaller --noconfirm --onefile --windowed `
          --name "${{ matrix.file_name }}" `
          --icon "logo.ico" `
          --add-data "payload.sql${{ matrix.sep }}." `
          --add-data "logo.png${{ matrix.sep }}." `
          --add-data "fond.png${{ matrix.sep }}." `
          --collect-all pymobiledevice3 `
          --hidden-import pymobiledevice3.services.afc `
          --hidden-import pymobiledevice3.services.diagnostics `
          --hidden-import pymobiledevice3.lockdown `
          main.py

    - name: Build Linux Executable
      if: runner.os == 'Linux'
      run: |
        pyinstaller --noconfirm --onefile --windowed \
          --name "${{ matrix.file_name }}" \
          --add-data "payload.sql${{ matrix.sep }}." \
          --add-data "logo.png${{ matrix.sep }}." \
          --add-data "fond.png${{ matrix.sep }}." \
          --collect-all pymobiledevice3 \
          --hidden-import pymobiledevice3.services.afc \
          --hidden-import pymobiledevice3.services.diagnostics \
          --hidden-import pymobiledevice3.lockdown \
          main.py

    - name: Package macOS DMG
      if: runner.os == 'macOS'
      run: |
        cd dist
        # Vérifier que le .app existe
        if [ ! -d "${{ matrix.file_name }}.app" ]; then
          echo "Erreur : .app introuvable"
          exit 1
        fi
        # Signature ad-hoc (nécessaire pour que l'app s'ouvre)
        codesign --force --deep --sign - "${{ matrix.file_name }}.app"
        # Créer le DMG
        create-dmg \
          --volname "iHPro Activator" \
          --window-pos 200 120 \
          --window-size 600 300 \
          --icon-size 100 \
          --text-size 12 \
          --hide-extension "${{ matrix.file_name }}.app" \
          --app-drop-link 450 140 \
          --icon "${{ matrix.file_name }}.app" 150 140 \
          "${{ matrix.file_name }}.dmg" \
          "${{ matrix.file_name }}.app"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.file_name }}
        path: |
          dist/*.dmg
          dist/*.exe
          dist/${{ matrix.file_name }}
